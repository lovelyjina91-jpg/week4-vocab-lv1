<script>
"use strict";

/* ══════ 결과 자동 전송 (영핏 공통) ══════ */
var ENGFIT_SUBMIT_URL = "https://script.google.com/macros/s/AKfycbz5IC3cEtaBGW10qZhrjwtjdtGugmcmYb4ZTHS4k-1LOqTRYzW-LfoAPyFB_ShjAqNp/exec";

async function engfitSubmit(r) {
  var body = JSON.stringify(r);
  try {
    var res = await fetch(ENGFIT_SUBMIT_URL, { method: "POST", body: body });
    var j = await res.json();
    return j.ok === true;
  } catch (e) {
    try {
      await fetch(ENGFIT_SUBMIT_URL, { method: "POST", mode: "no-cors", body: body });
      return true;
    } catch (e2) { return false; }
  }
}

var _engfitSent = false;
async function engfitSubmitWithStatus(r) {
  if (_engfitSent) return; _engfitSent = true;
  var el = document.getElementById("submit-status");
  el.textContent = "결과 전송 중...";
  el.style.color = "#94a3b8";
  var ok = await engfitSubmit(r);
  if (ok) { el.textContent = "✓ 결과가 지나티처에게 자동 전송되었어요"; el.style.color = "#4ade80"; }

}

var QUIZ_TITLE = "단어시험 Lv.1 Week 4";

/* ══════ 문제 생성 ══════ */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

/* 영역: 프린트 순서 그대로 50개씩 분할 */
var SEC_SIZE = 50;
var SECTIONS = [];
for (var s = 0; s < WORDS.length; s += SEC_SIZE) {
  SECTIONS.push({ from: s + 1, to: Math.min(s + SEC_SIZE, WORDS.length), words: WORDS.slice(s, s + SEC_SIZE) });
}
var selectedSec = -1;

function buildQuestions(sectionWords) {
  return sectionWords.map(function (w) {
    var ek = Math.random() < 0.5; // true: 영→한
    var answer = ek ? w.ko : w.en;
    var pool = WORDS.filter(function (o) {
      return o !== w && (ek ? o.ko !== w.ko : o.en.toLowerCase() !== w.en.toLowerCase());
    }).map(function (o) { return ek ? o.ko : o.en; });
    var seen = {}; var uniq = [];
    shuffle(pool).forEach(function (p) { if (!seen[p]) { seen[p] = 1; uniq.push(p); } });
    var options = shuffle([answer].concat(uniq.slice(0, 3)));
    return { ek: ek, q: ek ? w.en : w.ko, answer: answer, options: options, en: w.en, ko: w.ko };
  });
}

/* ══════ 상태 ══════ */
var studentName = "";
var QS = [];
var cur = 0;
var picked = [];      // index of chosen option per question
var startTime = 0;
var timerIv = null;
var locked = false;

var $ = function (id) { return document.getElementById(id); };

$("start-sub").textContent = "전체 " + WORDS.length + "단어 · " + SECTIONS.length + "개 영역 · 영한/한영 혼합 4지선다";

var secGrid = $("sec-grid");
SECTIONS.forEach(function (sec, i) {
  var b = document.createElement("button");
  b.className = "sec-btn";
  b.innerHTML = (i + 1) + "영역<span class=\"range\">" + sec.from + "~" + sec.to + "</span>";
  b.addEventListener("click", function () {
    selectedSec = i;
    Array.prototype.forEach.call(secGrid.children, function (c, j) {
      c.className = "sec-btn" + (j === i ? " on" : "");
    });
    updateStartBtn();
  });
  secGrid.appendChild(b);
});

function updateStartBtn() {
  $("start-btn").disabled = $("name-input").value.trim().length === 0 || selectedSec < 0;
}

$("name-input").addEventListener("input", updateStartBtn);
$("name-input").addEventListener("keydown", function (e) {
  if (e.key === "Enter" && this.value.trim() && selectedSec >= 0) startQuiz();
});
$("start-btn").addEventListener("click", startQuiz);

function secLabel() {
  var sec = SECTIONS[selectedSec];
  return (selectedSec + 1) + "영역 (" + sec.from + "~" + sec.to + ")";
}

function startQuiz() {
  studentName = $("name-input").value.trim();
  if (!studentName || selectedSec < 0) return;
  QS = buildQuestions(SECTIONS[selectedSec].words);
  picked = new Array(QS.length);
  cur = 0;
  startTime = Date.now();
  _engfitSent = false;
  $("start-screen").classList.add("hidden");
  $("result-screen").classList.add("hidden");
  $("quiz-screen").classList.remove("hidden");
  if (timerIv) clearInterval(timerIv);
  timerIv = setInterval(function () {
    var s = Math.floor((Date.now() - startTime) / 1000);
    $("timer").textContent = Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
  }, 1000);
  render();
}

var CIRCLED = ["①", "②", "③", "④"];
var ACC = { ek: "#3b82f6", ke: "#f97316" };

function render() {
  var q = QS[cur];
  var acc = q.ek ? ACC.ek : ACC.ke;
  $("prog-text").textContent = (cur + 1) + " / " + QS.length;
  $("pfill").style.width = ((cur) / QS.length * 100) + "%";
  $("qno").textContent = "Q" + (cur + 1);
  $("qno").style.color = acc;
  var qt = $("qtype");
  qt.textContent = q.ek ? "영→한" : "한→영";
  qt.style.color = acc;
  qt.style.background = acc + "22";
  var qw = $("qword");
  qw.textContent = q.q;
  qw.className = "qword " + (q.ek ? "ek en" : "ke");
  var box = $("choices");
  box.innerHTML = "";
  q.options.forEach(function (opt, i) {
    var b = document.createElement("button");
    b.className = "choice" + (picked[cur] === i ? (q.ek ? " sel-ek" : " sel-ke") : "");
    var num = document.createElement("span");
    num.className = "cnum"; num.textContent = CIRCLED[i];
    var tx = document.createElement("span");
    tx.className = "ctext " + (q.ek ? "ko" : "en");
    tx.textContent = opt;
    b.appendChild(num); b.appendChild(tx);
    b.addEventListener("click", function () { pick(i); });
    box.appendChild(b);
  });
  $("prev-btn").style.visibility = cur === 0 ? "hidden" : "visible";
  window.scrollTo(0, 0);
}

function pick(i) {
  if (locked) return; locked = true;
  picked[cur] = i;
  render(); // show selection highlight
  setTimeout(function () {
    locked = false;
    if (cur < QS.length - 1) { cur++; render(); }
    else finish();
  }, 250);
}

$("prev-btn").addEventListener("click", function () {
  if (locked || cur === 0) return;
  cur--; render();
});

document.addEventListener("keydown", function (e) {
  if ($("quiz-screen").classList.contains("hidden")) return;
  if (e.key >= "1" && e.key <= "4") pick(Number(e.key) - 1);
  else if (e.key === "ArrowLeft" && cur > 0 && !locked) { cur--; render(); }
});

/* ══════ 결과 ══════ */
var lastResult = null;

function finish() {
  clearInterval(timerIv);
  var sec = Math.round((Date.now() - startTime) / 1000);
  var correct = 0, wrongNos = [], wrongs = [], detail = [];
  QS.forEach(function (q, i) {
    var chosen = picked[i] === undefined ? "" : q.options[picked[i]];
    var ok = chosen === q.answer;
    if (ok) correct++;
    else { wrongNos.push(i + 1); wrongs.push({ no: i + 1, q: q, chosen: chosen }); }
    detail.push({ no: i + 1, ok: ok, chosen: chosen, answer: q.answer });
  });
  lastResult = { correct: correct, total: QS.length, sec: sec, wrongs: wrongs, wrongNos: wrongNos };

  $("quiz-screen").classList.add("hidden");
  $("result-screen").classList.remove("hidden");
  $("r-name").textContent = studentName + " · " + secLabel() + " · " + new Date().toLocaleDateString("ko-KR");
  $("r-score").textContent = correct + " / " + QS.length;
  $("r-sub").textContent = Math.round(correct / QS.length * 100) + "% · " + fmtTime(sec);

  var wl = $("wrong-list");
  wl.innerHTML = "";
  if (wrongs.length === 0) {
    $("wrong-title").textContent = "";
    var d = document.createElement("div");
    d.className = "rcard allok";
    d.textContent = "🎉 만점! 전부 정답이에요!";
    wl.appendChild(d);
  } else {
    $("wrong-title").textContent = "❌ 오답 확인 (" + wrongs.length + "개)";
    wrongs.forEach(function (w) {
      var d = document.createElement("div");
      d.className = "witem";
      var qspan = w.q.ek ? '<span class="en">' + esc(w.q.en) + '</span>' : esc(w.q.ko);
      var mySpan = w.chosen === "" ? "(무응답)" : wrapLang(w.chosen, !w.q.ek);
      d.innerHTML = '<div class="wq">Q' + w.no + '. ' + qspan + '</div>' +
        '<div class="wrow">내 답: <span class="my">' + mySpan + '</span><br>' +
        '정답: <span class="ans">' + wrapLang(w.q.answer, !w.q.ek) + '</span>' +
        ' &nbsp;<span style="color:#64748b">(' + '<span class="en">' + esc(w.q.en) + '</span> = ' + esc(w.q.ko) + ')</span></div>';
      wl.appendChild(d);
    });
  }
  window.scrollTo(0, 0);

  engfitSubmitWithStatus({
    quizId: QUIZ_ID,
    quizTitle: QUIZ_TITLE + " — " + secLabel(),
    student: studentName,
    score: correct,
    total: QS.length,
    wrong: wrongNos,
    durationSec: sec,
    detail: detail
  });
}

function wrapLang(text, isEn) {
  return isEn ? '<span class="en">' + esc(text) + '</span>' : esc(text);
}
function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function fmtTime(sec) {
  return Math.floor(sec / 60) + "분 " + (sec % 60) + "초";
}

function buildKakaoText() {
  var r = lastResult;
  var date = new Date().toLocaleDateString("ko-KR");
  var t = "[EngFit " + QUIZ_TITLE + " — " + secLabel() + "]\n";
  t += studentName + " | " + date + "\n";
  t += r.correct + "/" + r.total + " (" + Math.round(r.correct / r.total * 100) + "%) | " + fmtTime(r.sec) + "\n";
  if (r.wrongs.length) {
    t += "\n[오답 " + r.wrongs.length + "개]\n";
    r.wrongs.forEach(function (w, i) { t += (i + 1) + ". " + w.q.en + " = " + w.q.ko + "\n"; });
  } else {
    t += "\n만점! 전부 정답!";
  }
  return t;
}

$("kakao-btn").addEventListener("click", function () {
  var msg = buildKakaoText();
  var btn = $("kakao-btn");
  function done() { btn.textContent = "✓ 복사 완료! 카톡에 붙여넣기 하세요"; btn.classList.add("done"); }
  function fallback() {
    var ta = $("copy-area");
    ta.value = msg;
    ta.classList.remove("hidden");
    ta.focus(); ta.select();
    try { document.execCommand("copy"); done(); } catch (e) {
      btn.textContent = "아래 내용을 길게 눌러 복사하세요";
    }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(msg).then(done).catch(fallback);
  } else fallback();
});

$("retry-btn").addEventListener("click", function () {
  $("result-screen").classList.add("hidden");
  $("start-screen").classList.remove("hidden");
  $("kakao-btn").textContent = "📋 결과 복사해서 카톡으로 보내기";
  $("kakao-btn").classList.remove("done");
  $("copy-area").classList.add("hidden");
  window.scrollTo(0, 0);
});
</script>
